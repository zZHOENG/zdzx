<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>网站开发工作组主页 | 中政集团</title>

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.luogu.com.cn/upload/image_hosting/x37au7h1.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.luogu.com.cn/upload/image_hosting/x37au7h1.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://cdn.luogu.com.cn/upload/image_hosting/x37au7h1.png">

    <!-- 字体与图标库 -->
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- MathJax 配置与脚本 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                packages: ['base', 'ams', 'text', 'color', 'boldsymbol'],
                macros: { space: "\\ ", to: "\\to", sim: "\\sim", dots: "\\dots", cdots: "\\cdots" }
            },
            options: { ignoreHtmlClass: 'tex2jax_ignore', processHtmlClass: 'tex2jax_process' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* ===== 全局重置与基础样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f4f7fc 0%, #eef2f7 100%);
            color: #1f2a3e;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
        }

        /* ===== 头部样式（与主页一致） ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(100, 116, 139, 0.2);
        }

        .logo-area {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .about-image img {
            border-radius: 12px;
        }

        .title-zone {
            text-align: right;
        }

        .typing-title {
            font-size: 2.0rem;
            font-weight: 600;
            background: linear-gradient(120deg, #3b4b6e, #6c5b9b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            border-right: 3px solid #8b7bb5;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: blinkCursor 0.75s step-end infinite;
        }

        @keyframes blinkCursor {
            0%, 100% { border-color: #8b7bb5; }
            50% { border-color: transparent; }
        }

        .sub {
            font-size: 0.8rem;
            color: #6f7d95;
            margin-top: 8px;
        }

        /* ===== 返回按钮 ===== */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            border: 1px solid #bdcbe2;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #40557a;
            margin-bottom: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }

        .btn-back:hover {
            background: #fff;
            border-color: #8fa1c2;
            color: #253c60;
        }

        /* ===== 文章卡片 ===== */
        .article-detail {
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 2rem 2rem 2.8rem;
            box-shadow: 0 10px 25px -12px rgba(0,0,0,0.1);
            border: 1px solid rgba(165, 185, 215, 0.5);
        }

        /* ===== 文章头部 ===== */
        .detail-header {
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e9eef4;
            padding-bottom: 1.2rem;
        }

        .detail-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1f2e4a;
            background: linear-gradient(135deg, #1f2e4a, #4a3f73);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.8rem;
        }

        .detail-meta {
            display: flex;
            gap: 1.8rem;
            font-size: 0.9rem;
            color: #6f7e9b;
        }

        /* ===== 文章正文样式 ===== */
        .detail-content {
            font-size: 1rem;
            color: #1f2a44;
            line-height: 1.65;
        }

        .detail-content h1,
        .detail-content h2,
        .detail-content h3 {
            margin: 1.5rem 0 0.8rem;
            font-weight: 600;
        }

        .detail-content p {
            margin: 1rem 0;
        }

        .detail-content blockquote {
            border-left: 4px solid #a9c0e6;
            background: #f5f9ff;
            padding: 0.8rem 1.2rem;
            border-radius: 20px;
            margin: 1rem 0;
        }

        .detail-content ul,
        .detail-content ol {
            padding-left: 1.8rem;
            margin: 0.8rem 0;
        }

        .detail-content li {
            margin: 0.3rem 0;
            line-height: 1.6;
        }

        .detail-content img {
            max-width: 100%;
            border-radius: 24px;
            margin: 1rem 0;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }

        .detail-content pre {
            background: #eef2fa;
            padding: 1rem;
            border-radius: 20px;
            overflow-x: auto;
        }

        .detail-content code {
            background: #eef2fa;
            padding: 0.2rem 0.4rem;
            border-radius: 12px;
            font-size: 0.9em;
        }

        /* ===== 提示信息框 ===== */
        .info-box {
            background: #eef3ff;
            border-radius: 24px;
            padding: 1.2rem 1.5rem;
            margin: 1.2rem 0;
            border-left: 6px solid #7c93c7;
        }

        /* ===== 图片卡片 ===== */
        .image-card {
            background: #f8faff;
            border-radius: 28px;
            padding: 0.8rem;
            text-align: center;
            margin: 1.4rem 0;
            border: 1px solid #dce5f2;
        }

        .image-card img {
            border-radius: 20px;
            margin: 0;
        }

        /* ===== 页脚 ===== */
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #8c9bbb;
            border-top: 1px solid rgba(128, 147, 175, 0.2);
            padding-top: 2rem;
        }

        /* ===== 响应式调整 ===== */
        @media (max-width: 700px) {
            .container {
                padding: 1rem;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .title-zone {
                text-align: left;
                width: 100%;
            }
            .typing-title {
                font-size: 1.4rem;
                white-space: normal;
                border-right: none;
                animation: none;
            }
            .detail-title {
                font-size: 1.6rem;
            }
        }

        /* ===== 暗色模式适配 ===== */
        @media (prefers-color-scheme: dark) {
            body {
                background: #121826;
                color: #e2e8f0;
            }

            .article-detail {
                background: #1e293b;
                border-color: #2d3748;
            }

            .detail-title {
                color: #cbd5e6;
                background: linear-gradient(135deg, #cbd5e6, #a5b4fc);
                -webkit-text-fill-color: transparent;
            }

            .detail-meta,
            .detail-content {
                color: #cbd5e1;
            }

            .detail-content blockquote {
                background: #0f172a;
                border-left-color: #6b7280;
                color: #e2e8f0;
            }

            .detail-content pre,
            .detail-content code {
                background: #0f172a;
                color: #e2e8f0;
            }

            .info-box {
                background: #0f172a;
                border-left-color: #818cf8;
            }

            .image-card {
                background: #0f172a;
                border-color: #334155;
            }

            .btn-back {
                background: #1e293b;
                border-color: #475569;
                color: #cbd5e6;
            }

            .btn-back:hover {
                background: #2d3a5e;
                border-color: #818cf8;
                color: white;
            }

            .header {
                border-bottom-color: rgba(100, 116, 139, 0.3);
            }
            .sub {
                color: #9ca3af;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部区域（与主页完全一致） -->
        <div class="header">
            <div class="logo-area">
                <div class="about-image">
                    <img src="https://cdn.luogu.com.cn/upload/image_hosting/ecqjbd5y.png" alt="中政集团 Logo" width="300" height="80">
                </div>
            </div>
            <div class="title-zone">
                <div class="typing-title" id="typingTitle"></div>
                <div class="sub">中政 ZHOENG · 河北正定中学办事处</div>
            </div>
        </div>

        <!-- 返回首页链接 -->
        <a class="btn-back" href="https://zdzx.zhongzheng.tech/">
            <i class="fas fa-arrow-left"></i> 返回首页
        </a>

        <!-- 文章详情容器 -->
        <div id="articleDetailContent" class="article-detail"></div>

        <footer>
            中政集团 · 中政科技 <span>&copy;</span> 2025-2026<br>
            中政 ZHOENG · 河北正定中学办事处 <span>&copy;</span> 2026-2026
        </footer>
    </div>

    <script>
        (function() {
            "use strict";

            // ===== 文章元数据 =====
            const articleMeta = {
                title: "网站开发工作组 · 主页",
                author: "ZZA000HAH",
                date: "2026.04.12",
                category: "主页"
            };

            // 外部 Markdown 文件路径（请根据实际存放位置调整）
            const contentFilePath = "https://zdzx.zhongzheng.tech/help/developer/d.md";

            // 简单的 HTML 转义
            function escapeHtml(str) {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;' };
                return String(str).replace(/[&<>]/g, c => map[c]);
            }

            // 打字机效果
            function typeWriterEffect() {
                const titleElement = document.getElementById('typingTitle');
                if (!titleElement) return;
                const fullText = "中政集团 · 中政科技";
                let i = 0;
                titleElement.textContent = '';
                function type() {
                    if (i < fullText.length) {
                        titleElement.textContent += fullText.charAt(i);
                        i++;
                        setTimeout(type, 100);
                    } else {
                        titleElement.style.borderRightColor = 'transparent';
                    }
                }
                type();
            }

            // 渲染文章内容
            async function renderArticle() {
                const container = document.getElementById('articleDetailContent');
                if (!container) return;

                const headerHtml = `
                    <div class="detail-header">
                        <div class="detail-title">${escapeHtml(articleMeta.title)}</div>
                        <div class="detail-meta">
                            <span><i class="far fa-user"></i> ${escapeHtml(articleMeta.author)}</span>
                            <span><i class="far fa-calendar-alt"></i> ${escapeHtml(articleMeta.date)}</span>
                            <span><i class="far fa-clock"></i> ${escapeHtml(articleMeta.category)}</span>
                        </div>
                    </div>
                    <div class="detail-content" id="detailMarkdownBody"></div>
                `;
                container.innerHTML = headerHtml;

                const contentDiv = document.getElementById('detailMarkdownBody');
                try {
                    const response = await fetch(contentFilePath);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const markdown = await response.text();
                    const rawHtml = marked.parse(markdown, { async: false });
                    contentDiv.innerHTML = rawHtml;
                    if (window.MathJax && typeof MathJax.typesetPromise === 'function') {
                        await MathJax.typesetPromise([contentDiv]);
                    }
                } catch (err) {
                    console.error('文章加载失败:', err);
                    contentDiv.innerHTML = '<p style="color: red;">文章内容加载失败，请稍后重试。</p>';
                }
            }

            // 页面初始化
            window.addEventListener('load', () => {
                typeWriterEffect();
                renderArticle();
            });
        })();
    </script>
</body>
</html>
